<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PitchApp - Usage Analytics</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }
        
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #14b8a6, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        header p {
            color: #94a3b8;
            font-size: 1rem;
        }
        
        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(20, 184, 166, 0.15);
        }
        
        .stat-card .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #14b8a6;
            margin-bottom: 4px;
        }
        
        .stat-card .label {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card .sub-value {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 8px;
        }
        
        /* Charts Section */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .chart-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }
        
        .chart-card h3 {
            font-size: 1.1rem;
            color: #e2e8f0;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        /* Bar Chart */
        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .bar-label {
            width: 80px;
            font-size: 0.85rem;
            color: #94a3b8;
            text-align: right;
        }
        
        .bar-track {
            flex: 1;
            height: 24px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #14b8a6, #2dd4bf);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #0f172a;
        }
        
        /* Time Series Chart */
        .time-chart {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            position: relative;
        }
        
        .time-bar {
            flex: 1;
            background: linear-gradient(to top, #14b8a6, #2dd4bf);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: opacity 0.2s;
            position: relative;
        }
        
        .time-bar:hover {
            opacity: 0.8;
        }
        
        .time-bar::after {
            content: attr(data-label);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%) rotate(-45deg);
            font-size: 0.7rem;
            color: #64748b;
            white-space: nowrap;
        }
        
        /* Log Table */
        .log-section {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .log-header h2 {
            font-size: 1.3rem;
            color: #e2e8f0;
        }
        
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .filters input, .filters select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            padding: 8px 14px;
            color: #e2e8f0;
            font-size: 0.9rem;
        }
        
        .filters input::placeholder {
            color: #64748b;
        }
        
        .filters button {
            background: #14b8a6;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .filters button:hover {
            background: #2dd4bf;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        thead th {
            text-align: left;
            padding: 14px 12px;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        
        tbody tr {
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: rgba(20, 184, 166, 0.05);
        }
        
        tbody td {
            padding: 14px 12px;
            color: #e2e8f0;
        }
        
        .username-cell {
            font-weight: 500;
            color: #14b8a6;
        }
        
        .score-cell {
            font-weight: 700;
            color: #2dd4bf;
        }
        
        .duration-cell {
            color: #94a3b8;
        }
        
        .date-cell {
            color: #64748b;
            font-size: 0.85rem;
        }
        
        .fingerprint-cell {
            font-family: monospace;
            font-size: 0.8rem;
            color: #475569;
        }
        
        .ip-tag, .device-tag {
            display: inline-block;
            margin-left: 6px;
            padding: 2px 6px;
            background: rgba(20, 184, 166, 0.15);
            border-radius: 4px;
            font-size: 0.7rem;
            color: #14b8a6;
            cursor: help;
        }
        
        .device-tag {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }
        
        .username-cell {
            font-weight: 500;
            color: #14b8a6;
        }
        
        .username-cell .ip-tag {
            font-weight: normal;
        }
        
        .expand-btn {
            background: rgba(20, 184, 166, 0.1);
            border: 1px solid rgba(20, 184, 166, 0.3);
            border-radius: 6px;
            padding: 6px 12px;
            color: #14b8a6;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .expand-btn:hover {
            background: rgba(20, 184, 166, 0.2);
        }
        
        .events-row {
            display: none;
            background: rgba(15, 23, 42, 0.5);
        }
        
        .events-row.expanded {
            display: table-row;
        }
        
        .events-cell {
            padding: 20px;
        }
        
        .event-timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .event-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            padding: 10px 14px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 8px;
            border-left: 3px solid #14b8a6;
        }
        
        .event-item.wrong {
            border-left-color: #ef4444;
        }
        
        .event-item.missed {
            border-left-color: #f59e0b;
        }
        
        .event-time {
            font-family: monospace;
            font-size: 0.8rem;
            color: #64748b;
            min-width: 80px;
        }
        
        .event-type {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(20, 184, 166, 0.2);
            color: #14b8a6;
            min-width: 100px;
            text-align: center;
        }
        
        .event-type.wrong {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .event-type.missed {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .event-data {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .error {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-section {
                grid-template-columns: 1fr;
            }
            
            .log-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            table {
                font-size: 0.8rem;
            }
            
            tbody td {
                padding: 10px 8px;
            }
            
            .fingerprint-cell {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 PitchApp Analytics</h1>
            <p>Usage statistics and session logs</p>
        </header>
        
        <div id="loading" class="loading">
            <p>Loading analytics...</p>
        </div>
        
        <div id="content" style="display: none;">
            <!-- Summary Stats -->
            <div class="summary-grid" id="summary-stats">
                <!-- Populated by JS -->
            </div>
            
            <!-- Charts -->
            <div class="charts-section">
                <div class="chart-card">
                    <h3>🎬 Most Played Videos</h3>
                    <div class="bar-chart" id="video-chart">
                        <!-- Populated by JS -->
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3>📈 Sessions Over Time</h3>
                    <div class="time-chart" id="time-chart">
                        <!-- Populated by JS -->
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3>⚡ Response Time Comparison</h3>
                    <div class="bar-chart" id="response-time-chart">
                        <!-- Populated by JS -->
                    </div>
                    <p style="color: #64748b; font-size: 0.85rem; margin-top: 12px;">
                        Average time to answer (seconds)
                    </p>
                </div>
            </div>
            
            <!-- Detailed Logs -->
            <div class="log-section">
                <div class="log-header">
                    <h2>📋 Session Logs</h2>
                    <div class="filters">
                        <input type="text" id="user-filter" placeholder="Filter by username...">
                        <select id="sort-by">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="highest-score">Highest Score</option>
                            <option value="longest">Longest Session</option>
                        </select>
                        <button onclick="refreshData()">🔄 Refresh</button>
                    </div>
                </div>
                
                <table id="log-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Score</th>
                            <th>Duration</th>
                            <th>Video</th>
                            <th>Clips</th>
                            <th>Date</th>
                            <th>Device</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="log-tbody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allLogs = [];
        let filteredLogs = [];
        
        // Get device icon based on user agent
        function getDeviceIcon(userAgent) {
            if (!userAgent) return '💻';
            const ua = userAgent.toLowerCase();
            if (ua.includes('mobile')) return '📱';
            if (ua.includes('tablet')) return '📱';
            if (ua.includes('android')) return '🤖';
            if (ua.includes('iphone') || ua.includes('ipad')) return '🍎';
            if (ua.includes('mac')) return '🍎';
            if (ua.includes('windows')) return '🪟';
            if (ua.includes('linux')) return '🐧';
            return '💻';
        }
        
        // Format duration in seconds to mm:ss string
        function formatDuration(seconds) {
            if (!seconds || seconds < 0 || seconds > 86400) return 'N/A'; // Max 24 hours
            // Handle if somehow milliseconds got stored
            if (seconds > 10000) seconds = Math.round(seconds / 1000);
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Format date nicely (handle ISO strings properly)
        function formatDate(isoString) {
            if (!isoString) return 'N/A';
            // Parse ISO string and create date in local timezone
            const date = new Date(isoString);
            // Check if valid date
            if (isNaN(date.getTime())) return 'Invalid';
            
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZoneName: 'short'
            });
        }
        
        // Calculate statistics
        function calculateStats(logs) {
            if (logs.length === 0) return null;
            
            const totalSessions = logs.length;
            const totalScore = logs.reduce((sum, log) => sum + (log.score || 0), 0);
            const avgScore = Math.round(totalScore / totalSessions);
            
            const totalDuration = logs.reduce((sum, log) => sum + (log.durationSeconds || 0), 0);
            const avgDuration = Math.round(totalDuration / totalSessions);
            
            const uniqueUsers = new Set(logs.map(log => log.username).filter(u => u && u !== 'Anonymous')).size;
            const uniqueDevices = new Set(logs.map(log => log.fingerprint)).size;
            
            // Calculate accuracy
            let totalCorrect = 0;
            let totalAnswers = 0;
            logs.forEach(log => {
                const endEvent = log.events?.find(e => e.type === 'SESSION_END');
                if (endEvent?.data) {
                    totalCorrect += endEvent.data.correctAnswers || 0;
                    totalAnswers += (endEvent.data.correctAnswers || 0) + (endEvent.data.wrongAnswers || 0);
                }
            });
            const avgAccuracy = totalAnswers > 0 ? Math.round((totalCorrect / totalAnswers) * 100) : 0;
            
            // Calculate average response times for correct vs wrong answers
            let correctTimeSum = 0;
            let correctCount = 0;
            let wrongTimeSum = 0;
            let wrongCount = 0;
            
            logs.forEach(log => {
                (log.events || []).forEach(event => {
                    if (event.type === 'ANSWER_CORRECT' && event.data?.timeTaken) {
                        correctTimeSum += event.data.timeTaken;
                        correctCount++;
                    } else if (event.type === 'ANSWER_WRONG' && event.data?.timeTaken) {
                        wrongTimeSum += event.data.timeTaken;
                        wrongCount++;
                    }
                });
            });
            
            const avgCorrectTime = correctCount > 0 ? correctTimeSum / correctCount : 0;
            const avgWrongTime = wrongCount > 0 ? wrongTimeSum / wrongCount : 0;
            
            // Find best score
            const bestScore = Math.max(...logs.map(log => log.score || 0));
            
            return {
                totalSessions,
                avgScore,
                avgDuration,
                uniqueUsers,
                uniqueDevices,
                avgAccuracy,
                bestScore,
                totalDuration,
                avgCorrectTime,
                avgWrongTime,
                correctCount,
                wrongCount
            };
        }
        
        // Render summary cards
        function renderSummary(stats) {
            const container = document.getElementById('summary-stats');
            
            const cards = [
                { icon: '🎮', value: stats.totalSessions, label: 'Total Sessions', sub: `${stats.uniqueDevices} unique devices` },
                { icon: '👤', value: stats.uniqueUsers, label: 'Named Users', sub: `${stats.uniqueDevices - stats.uniqueUsers} anonymous` },
                { icon: '⭐', value: stats.avgScore.toLocaleString(), label: 'Average Score', sub: `Best: ${stats.bestScore.toLocaleString()}` },
                { icon: '🎯', value: `${stats.avgAccuracy}%`, label: 'Avg Accuracy', sub: 'Correct answers' },
                { icon: '⏱️', value: formatDuration(stats.avgDuration), label: 'Avg Session', sub: `${formatDuration(stats.totalDuration)} total` },
                { icon: '🏆', value: stats.bestScore.toLocaleString(), label: 'High Score', sub: 'All time best' },
                { icon: '⚡', value: stats.avgCorrectTime > 0 ? stats.avgCorrectTime.toFixed(2) + 's' : 'N/A', label: 'Avg Correct Time', sub: stats.avgWrongTime > 0 ? `Wrong: ${stats.avgWrongTime.toFixed(2)}s` : '' }
            ];
            
            container.innerHTML = cards.map(card => `
                <div class="stat-card">
                    <div class="icon">${card.icon}</div>
                    <div class="value">${card.value}</div>
                    <div class="label">${card.label}</div>
                    <div class="sub-value">${card.sub}</div>
                </div>
            `).join('');
        }
        
        // Render video popularity chart
        function renderVideoChart(logs) {
            const videoCounts = {};
            logs.forEach(log => {
                const videoId = log.videoId || 'unknown';
                videoCounts[videoId] = (videoCounts[videoId] || 0) + 1;
            });
            
            const sorted = Object.entries(videoCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
            
            const max = Math.max(...sorted.map(s => s[1]));
            
            const container = document.getElementById('video-chart');
            container.innerHTML = sorted.map(([videoId, count]) => {
                const percent = (count / max) * 100;
                const shortId = videoId.length > 8 ? videoId.substring(0, 8) + '...' : videoId;
                return `
                    <div class="bar-row">
                        <div class="bar-label">${shortId}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${percent}%">${count}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Render time series chart
        function renderTimeChart(logs) {
            // Group by date (last 14 days including today)
            const byDate = {};
            const today = new Date();
            
            // Initialize last 14 days
            for (let i = 13; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                // Use local date string to avoid timezone issues
                const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                byDate[key] = 0;
            }
            
            // Count sessions
            logs.forEach(log => {
                if (!log.sessionStart) return;
                // Parse the ISO date properly
                const d = new Date(log.sessionStart);
                const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                if (byDate.hasOwnProperty(key)) {
                    byDate[key]++;
                }
            });
            
            const entries = Object.entries(byDate);
            const max = Math.max(...entries.map(e => e[1]), 1);
            
            const container = document.getElementById('time-chart');
            container.innerHTML = entries.map(([date, count]) => {
                const height = (count / max) * 100;
                const label = new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `
                    <div class="time-bar" style="height: ${height}%" data-label="${label}" title="${count} sessions on ${label}"></div>
                `;
            }).join('');
        }
        
        // Render response time comparison chart
        function renderResponseTimeChart(logs) {
            let correctTimeSum = 0;
            let correctCount = 0;
            let wrongTimeSum = 0;
            let wrongCount = 0;
            
            logs.forEach(log => {
                (log.events || []).forEach(event => {
                    if (event.type === 'ANSWER_CORRECT' && event.data?.timeTaken) {
                        correctTimeSum += event.data.timeTaken;
                        correctCount++;
                    } else if (event.type === 'ANSWER_WRONG' && event.data?.timeTaken) {
                        wrongTimeSum += event.data.timeTaken;
                        wrongCount++;
                    }
                });
            });
            
            const avgCorrect = correctCount > 0 ? correctTimeSum / correctCount : 0;
            const avgWrong = wrongCount > 0 ? wrongTimeSum / wrongCount : 0;
            const max = Math.max(avgCorrect, avgWrong, 0.1);
            
            const container = document.getElementById('response-time-chart');
            
            if (correctCount === 0 && wrongCount === 0) {
                container.innerHTML = '<p style="color: #64748b; text-align: center;">No data yet</p>';
                return;
            }
            
            container.innerHTML = `
                <div class="bar-row">
                    <div class="bar-label" style="color: #14b8a6;">✓ Correct</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(avgCorrect / max) * 100}%; background: linear-gradient(90deg, #14b8a6, #2dd4bf);">
                            ${avgCorrect > 0 ? avgCorrect.toFixed(2) + 's' : 'N/A'}
                        </div>
                    </div>
                    <div style="min-width: 60px; text-align: right; font-size: 0.85rem; color: #64748b;">
                        ${correctCount} answers
                    </div>
                </div>
                <div class="bar-row" style="margin-top: 16px;">
                    <div class="bar-label" style="color: #ef4444;">✗ Wrong</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(avgWrong / max) * 100}%; background: linear-gradient(90deg, #ef4444, #f87171);">
                            ${avgWrong > 0 ? avgWrong.toFixed(2) + 's' : 'N/A'}
                        </div>
                    </div>
                    <div style="min-width: 60px; text-align: right; font-size: 0.85rem; color: #64748b;">
                        ${wrongCount} answers
                    </div>
                </div>
            `;
        }
        
        // Render log table
        function renderTable(logs) {
            const tbody = document.getElementById('log-tbody');
            
            if (logs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No logs found matching your criteria</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = logs.map((log, index) => {
                const endEvent = log.events?.find(e => e.type === 'SESSION_END');
                const accuracy = endEvent?.data?.percentageCorrect || 0;
                
                return `
                    <tr>
                        <td class="username-cell">
                            ${log.username || 'Anonymous'}
                            ${log.ipHash ? `<span class="ip-tag" title="IP: ${log.ipHash}">📍${log.ipHash.substring(0,6)}</span>` : ''}
                        </td>
                        <td class="score-cell">${(log.score || 0).toLocaleString()}</td>
                        <td class="duration-cell">${formatDuration(log.durationSeconds)}</td>
                        <td>${log.videoId?.substring(0, 10) || 'N/A'}...</td>
                        <td>${log.totalClips || 0}</td>
                        <td class="date-cell">${formatDate(log.sessionStart)}</td>
                        <td class="fingerprint-cell">
                            ${log.fingerprint?.substring(0, 8) || 'N/A'}...
                            ${log.userAgent ? `<span class="device-tag" title="${log.userAgent}">${getDeviceIcon(log.userAgent)}</span>` : ''}
                        </td>
                        <td>
                            <button class="expand-btn" onclick="toggleEvents(${index})">
                                View Events
                            </button>
                        </td>
                    </tr>
                    <tr class="events-row" id="events-${index}">
                        <td colspan="8" class="events-cell">
                            <div class="event-timeline">
                                ${(log.events || []).map(event => {
                                    let typeClass = '';
                                    if (event.type === 'ANSWER_WRONG') typeClass = 'wrong';
                                    if (event.type === 'ANSWER_MISSED') typeClass = 'missed';
                                    
                                    let dataText = '';
                                    if (event.data) {
                                        if (event.data.guessed) dataText += `Guessed: ${event.data.guessed}, Correct: ${event.data.correct}`;
                                        if (event.data.pointsEarned !== undefined) dataText += ` (+${event.data.pointsEarned} pts)`;
                                        if (event.data.timeTaken) dataText += ` in ${event.data.timeTaken.toFixed(2)}s`;
                                        if (event.data.finalScore !== undefined) {
                                            dataText += `Final: ${event.data.finalScore}, ${event.data.correctAnswers}/${event.data.totalClips} correct (${event.data.percentageCorrect}%)`;
                                        }
                                    }
                                    
                                    return `
                                        <div class="event-item ${typeClass}">
                                            <div class="event-time">${new Date(event.timestamp).toLocaleTimeString()}</div>
                                            <div class="event-type ${typeClass}">${event.type}</div>
                                            <div class="event-data">${dataText}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // Toggle events visibility
        window.toggleEvents = function(index) {
            const row = document.getElementById(`events-${index}`);
            row.classList.toggle('expanded');
        };
        
        // Apply filters and sorting
        function applyFilters() {
            const userFilter = document.getElementById('user-filter').value.toLowerCase();
            const sortBy = document.getElementById('sort-by').value;
            
            // Filter
            filteredLogs = allLogs.filter(log => {
                const username = (log.username || 'anonymous').toLowerCase();
                return username.includes(userFilter);
            });
            
            // Sort
            filteredLogs.sort((a, b) => {
                switch(sortBy) {
                    case 'newest':
                        return new Date(b.sessionStart) - new Date(a.sessionStart);
                    case 'oldest':
                        return new Date(a.sessionStart) - new Date(b.sessionStart);
                    case 'highest-score':
                        return (b.score || 0) - (a.score || 0);
                    case 'longest':
                        return (b.durationSeconds || 0) - (a.durationSeconds || 0);
                    default:
                        return 0;
                }
            });
            
            renderTable(filteredLogs);
        }
        
        // Refresh data from server
        async function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            
            try {
                const response = await fetch('/api/log.json');
                if (!response.ok) throw new Error('Failed to fetch logs');
                
                allLogs = await response.json();
                filteredLogs = [...allLogs];
                
                // Calculate and render stats
                const stats = calculateStats(allLogs);
                if (stats) {
                    renderSummary(stats);
                    renderVideoChart(allLogs);
                    renderTimeChart(allLogs);
                    renderResponseTimeChart(allLogs);
                }
                
                // Apply current filters and render table
                applyFilters();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (err) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <p>❌ Error loading logs</p>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }
        
        // Event listeners for filters
        document.getElementById('user-filter')?.addEventListener('input', applyFilters);
        document.getElementById('sort-by')?.addEventListener('change', applyFilters);
        
        // Initial load
        refreshData();
    </script>
</body>
</html>
