<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pitch Recognition Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link directly to the stylesheet -->
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <!-- Link directly to the image -->
            <img src="static/images/logo.svg" alt="Logo">
        </div>
        <nav>
            <a href="#" class="nav-item active"><i class="fas fa-home"></i> Home</a>
            <a href="#" class="nav-item"><i class="fas fa-globe"></i> Game</a>
            <a href="#" class="nav-item"><i class="fas fa-chart-bar"></i> Scores</a>
            <a href="#" class="nav-item"><i class="fas fa-book-open"></i> Lessons</a>
            <a href="#" class="nav-item"><i class="fas fa-sign-in-alt"></i> Login</a>
        </nav>
    </header>

    <main id="app-container">
        <div id="home-screen">
            <div class="main-logo">
                 <!-- Link directly to the image -->
                 <img src="static/images/logo.svg" alt="Main Logo">
            </div>
            <h1>The Pitch Recognition Tool</h1>
            <p class="tagline">Sharpen your eye, master the mound. Identify<br>pitches like a pro and climb the ranks.</p>
            <div class="button-group">
                <button id="start-training-btn" class="btn btn-primary"><i class="fas fa-play"></i> Start Training</button>
                <button id="view-leaderboard-btn" class="btn btn-secondary"><i class="fas fa-chart-bar"></i> View Leaderboard</button>
            </div>
            <p class="login-prompt">
                <a href="#"><i class="fas fa-lock"></i> Log in</a> to save your scores and track progress!
            </p>
        </div>

        <!-- Game screen (initially hidden) -->
        <div id="game-screen" class="hidden">
            <video id="pitch-video" width="640" height="360" controlslist="nodownload" oncontextmenu="return false;"></video>
            <div id="feedback"></div>
            <div id="pitch-choices" class="button-group">
                <button class="btn btn-choice" data-pitch="fastball">Fastball</button>
                <button class="btn btn-choice" data-pitch="curveball">Curveball</button>
            </div>
            <div id="game-info">
                Score: <span id="score">0</span> | Pitch: <span id="pitch-count">1</span> / 10
            </div>
        </div>

        <!-- Leaderboard screen (initially hidden) -->
        <div id="leaderboard-screen" class="hidden">
            <h2><i class="fas fa-trophy"></i> Leaderboard</h2>
            <ol id="leaderboard-list">
                <!-- Scores will be populated here by JavaScript -->
            </ol>
            <button id="back-to-home-btn" class="btn btn-secondary">Back to Home</button>
        </div>

    </main>
    
    <!-- Link directly to the JavaScript file -->
    <script src="static/js/app.js"></script>
</body>
</html>
